services:

  # ─── PostgreSQL 16 ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: aura_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-aurawear}
      POSTGRES_USER:     ${POSTGRES_USER:-aura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aurapassword}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aura} -d ${POSTGRES_DB:-aurawear}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - aura_network

  # ─── n8n Workflow Engine (AI chatbot backend) ─────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: aura_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      WEBHOOK_URL:                        "http://localhost:5678"
      N8N_HOST:                           "0.0.0.0"
      N8N_PORT:                           5678
      N8N_PROTOCOL:                       "http"
      N8N_EDITOR_BASE_URL:                "http://localhost:5678"
      GENERIC_TIMEZONE:                   "Asia/Karachi"
      N8N_DIAGNOSTICS_ENABLED:           "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_LOG_LEVEL:                      "info"
      N8N_API_DISABLED:                   "false"
      N8N_BLOCK_ENV_ACCESS_IN_NODE:       "false"
      GEMINI_API_KEY:                     ${GEMINI_API_KEY:-}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/aura-wear-workflow.json:/data/aura-wear-workflow.json:ro
    networks:
      - aura_network

  # ─── FastAPI Backend + Vanilla JS Frontend ────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aura_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL:      postgresql+asyncpg://${POSTGRES_USER:-aura}:${POSTGRES_PASSWORD:-aurapassword}@db:5432/${POSTGRES_DB:-aurawear}
      N8N_WEBHOOK_URL:   http://n8n:5678/webhook/aura-chat
      GEMINI_API_KEY:    ${GEMINI_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads
      - ./index.html:/app/index.html:ro
      - ./style.css:/app/style.css:ro
      - ./app.js:/app/app.js:ro
      - ./main.py:/app/main.py:ro
      - ./static:/app/static:ro
    depends_on:
      db:
        condition: service_healthy
      n8n:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/docs')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - aura_network

volumes:
  db_data:
  n8n_data:
  uploads_data:

networks:
  aura_network:
    driver: bridge
