services:

  # ─── MySQL Database ────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: aura_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aurawear}
      MYSQL_USER: ${MYSQL_USER:-aura}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aurapassword}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aura_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-aura}:${MYSQL_PASSWORD:-aurapassword}@db:3306/${MYSQL_DATABASE:-aurawear}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-super-secret-key}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  uploads_data:
